version: 2

models:

  - name: dim_customer

    columns:

      - name: customer_key
        tests:
          - unique
          - not_null

  - name: dim_product

    columns:

      - name: product_key
        tests:
          - unique
          - not_null

  - name: dim_date

    columns:

      - name: date_key
        tests:
          - unique
          - not_null

  - name: fact_sales

    columns:

      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key

      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key

      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key